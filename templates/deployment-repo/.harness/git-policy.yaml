schema_version: 1
repository_type: deployment-repo
commit_types: [feat, fix, refactor, docs, test, chore]
version_in_git:
  - deployment scripts
  - manifests
  - environment templates without secrets
  - runbooks
forbidden_paths:
  - .env
  - artifacts/
  - releases/
  - tmp/
large_artifact_limit_mb: 100
