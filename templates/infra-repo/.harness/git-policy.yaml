schema_version: 1
repository_type: infra-repo
commit_types: [feat, fix, refactor, docs, test, chore]
version_in_git:
  - terraform
  - ansible
  - helm
  - kubernetes
  - docker-compose
  - environment templates without secrets
forbidden_paths:
  - .env
  - .terraform/
  - "*.tfstate"
  - "*.tfstate.*"
  - artifacts/
large_artifact_limit_mb: 100
