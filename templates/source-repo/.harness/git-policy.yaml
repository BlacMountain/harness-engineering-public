schema_version: 1
repository_type: source-repo
commit_types: [feat, fix, refactor, docs, test, chore]
forbidden_paths:
  - .venv/
  - node_modules/
  - dist/
  - build/
  - coverage/
  - data/
  - datasets/
  - models/
  - checkpoints/
  - outputs/
  - results/
  - .env
large_artifact_limit_mb: 100
