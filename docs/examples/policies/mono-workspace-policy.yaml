schema_version: 1
workspace_type: mono-workspace
repository_root: null
repositories:
  - path: service-a
    role: source-repo
  - path: service-b
    role: source-repo
  - path: deployment
    role: deployment-repo
git_init_policy:
  allow_git_init_at_workspace_root: false
  require_confirmation_if_no_git_root: true
  require_status_before_changes: true
boundary_rules:
  - The workspace root is not a git repository.
  - Run git commands only inside listed repository paths.
  - Do not run git init . at the workspace root.
