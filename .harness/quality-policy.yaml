schema_version: 1
required_command_entrypoints:
  setup: scripts/setup
  lint: scripts/lint
  test: scripts/test
  dev: scripts/dev
  harness_check: scripts/harness-check
verification_report_requires:
  - files_changed
  - policies_used
  - commands_run
  - git_status
  - remaining_risks
minimum_checks:
  - required files exist
  - required directories exist
  - command entry points exist and are executable
  - .gitignore covers git forbidden paths
  - large files are not tracked or staged
  - legacy Agent.md entry is absent
