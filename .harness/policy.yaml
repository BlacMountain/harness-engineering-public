schema_version: 1

harness:
  repository_role: harness-seed
  model: unified-project-lifecycle
  source_of_truth:
    - README.md
    - AGENTS.md
    - HARNESS_QUICKSTART.md
    - .harness/policy.yaml
    - docs/
    - scripts/

workspace:
  workspace_type: single-repo
  repository_root: .
  repositories:
    - path: .
      role: harness-guide
  git_init_policy:
    allow_git_init_at_workspace_root: true
    require_confirmation_if_no_git_root: true
    require_status_before_changes: true
  boundary_rules:
    - Treat this directory as the repository root.
    - Do not initialize git above this directory.
    - For mono-workspace projects, list each repository explicitly before git work.

structure:
  required_files:
    - README.md
    - AGENTS.md
    - HARNESS_QUICKSTART.md
    - ARCHITECTURE.md
    - docs/HARNESS_GUIDE.md
    - docs/GIT_POLICY.md
    - docs/CODEX_CUSTOM_INSTRUCTIONS.md
    - docs/QUALITY.md
    - docs/RELIABILITY.md
    - docs/SECURITY.md
    - docs/product-specs/README.md
    - docs/product-specs/index.md
    - docs/decisions/README.md
    - docs/decisions/index.md
    - docs/references/README.md
    - docs/references/index.md
    - docs/exec-plans/README.md
    - docs/exec-plans/tech-debt-tracker.md
  required_directories:
    - .harness
    - docs
    - docs/product-specs
    - docs/exec-plans/active
    - docs/exec-plans/completed
    - docs/decisions
    - docs/references
    - scripts

commands:
  setup: scripts/setup
  lint: scripts/lint
  test: scripts/test
  dev: scripts/dev
  harness_check: scripts/harness-check

git:
  default_branch: main
  commit_types:
    - feat
    - fix
    - refactor
    - docs
    - test
    - chore
  allowed_to_version:
    - source code
    - documentation
    - policy files
    - scripts
    - configuration templates
  forbidden_paths:
    - .venv/
    - venv/
    - env/
    - node_modules/
    - dist/
    - build/
    - coverage/
    - data/
    - dataset/
    - datasets/
    - models/
    - checkpoints/
    - outputs/
    - results/
    - artifacts/
    - .env
    - .env.*
    - .DS_Store
  large_artifact_limit_mb: 100
  large_artifact_policy: Do not commit files larger than the limit; use an artifact store instead.
  required_gitignore_entries:
    - .DS_Store
    - .venv/
    - node_modules/
    - dist/
    - build/
    - coverage/
    - data/
    - dataset/
    - datasets/
    - models/
    - checkpoints/
    - outputs/
    - results/
    - .env
  rules:
    - MUST run git status --short before edits in an existing repository.
    - MUST keep commits small, purposeful, and verifiable.
    - MUST NOT revert or overwrite user changes unless explicitly requested.
    - MUST NOT commit secrets, local environment files, generated dependency folders, datasets, checkpoints, or outputs.

quality:
  verification_report_requires:
    - files_changed
    - policies_used
    - commands_run
    - git_status
    - remaining_risks
  minimum_checks:
    - required files exist
    - required directories exist
    - command entry points exist and are executable
    - .gitignore covers git forbidden paths
    - large files are not tracked or staged
    - single AGENTS.md entry is enforced
    - AGENTS.md stays within the configured line limit
    - .harness policy is consumed by scripts/harness-check

architecture:
  architecture_type: harness-seed-operating-model
  layers:
    - name: route
      paths:
        - README.md
        - AGENTS.md
        - HARNESS_QUICKSTART.md
    - name: knowledge
      paths:
        - docs/
        - ARCHITECTURE.md
    - name: machine-policy
      paths:
        - .harness/policy.yaml
    - name: executable-checks
      paths:
        - scripts/
  dependency_rules:
    - Route files stay short and point to durable policy, docs, and checks.
    - Machine-readable policy is the source of truth for durable constraints consumed by scripts.
    - Documentation explains policy and must not contradict machine-readable policy.
    - Scripts enforce policy and should fail with actionable messages.
    - Project differences belong in target-local policy deltas, not seed-level template branches.
  file_rules:
    max_agent_entry_lines: 100
    prefer_must_should_never_for_constraints: true
